<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Content Diagnostic Sheet</title>
    <link rel="stylesheet" href="./public/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Website Content Diagnostic Sheet</h1>
        <p>Comprehensive Current State Assessment</p>
      </header>

      <section class="card">
        <h2>Respondent Details</h2>
        <div class="grid">
          <label>
            Name
            <input id="respondentName" type="text" placeholder="Your name" />
          </label>
          <label>
            Company
            <input id="respondentCompany" type="text" placeholder="Company name" />
          </label>
          <label>
            Email
            <input id="respondentEmail" type="email" placeholder="you@example.com" />
          </label>
          <label>
            Phone
            <input id="respondentPhone" type="tel" placeholder="+966..." />
          </label>
        </div>
      </section>

      <form id="diagnosticForm"></form>

      <footer class="actions">
        <button id="submitBtn" type="button">Submit Diagnostic Form</button>
        <p id="result" aria-live="polite"></p>
      </footer>
    </main>

    <script src="./public/app.js"></script>
  </body>
</html>
